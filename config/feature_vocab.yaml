# Bounded feature vocabulary for crypto intraday microstructure.
#
# This vocabulary is INTENTIONALLY SMALL so that cross-run wiki stays bounded:
#   facts/features/<feature>.md   ≤ len(features)
#   facts/combinations/<A>_x_<B>.md ≤ C(len(features), 2)
#
# Keep <= 15 entries. Adding a feature is a PR-level decision.
#
# Each entry is the canonical name; strategy code / algorithm_prompt.txt must
# reference these keys when declaring which feature the expression uses.

version: 1

features:
  volume_imbalance:
    description: "(buy_vol - sell_vol) / total_vol, range [-1, +1]."
    source: "MarketState.imbalance (tick data default)."

  vpin:
    description: "Volume-synchronized probability of informed trading."
    source: "Bucket-based, computed in strategy.setup()."

  ofi:
    description: "Order flow imbalance — net aggressive order pressure."
    source: "Derived from tick side labels."

  price_momentum:
    description: "Return over N bars (close / close.shift(N) - 1)."
    source: "MarketState.close history."

  realized_volatility:
    description: "Rolling stdev of log returns."
    source: "Computed in strategy."

  vwap_deviation:
    description: "(close - vwap) / vwap."
    source: "MarketState.vwap, MarketState.close."

  trade_intensity:
    description: "Ticks per unit time — activity regime proxy."
    source: "Tick timestamp deltas."

  funding_carry:
    description: "Funding rate aligned to position side (sign of cost/income)."
    source: "funding_loader."

  basis:
    description: "Futures - spot (or perp - index) spread."
    source: "Computed from dual-feed if available."

  open_interest_change:
    description: "OI delta over N bars — fresh positioning indicator."
    source: "Exchange metadata (if ingested)."

  trend_state:
    description: "Categorical trend tag {up, down, range} from longer-timeframe."
    source: "Computed from higher TF in strategy."

  kyle_lambda:
    description: "Price impact per unit volume — liquidity regime proxy."
    source: "Regressed in strategy."
