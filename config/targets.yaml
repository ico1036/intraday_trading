# Default APPROVED criteria. PLAN.md can override per-run via `targets:` block.
#
# Analyst evaluates an expression against `primary` (hard gates) and
# `auto_reject` (instant NEED_IMPROVEMENT). `secondary` is informational only
# and must not block approval.
#
# `os_ratio` gates overfitting — applied after primary passes IS.

version: 1

defaults:
  primary:
    profit_factor:
      op: ">="
      value: 1.3
    max_drawdown:
      op: ">="
      value: -0.15
    total_return:
      op: ">="
      value: 0.05
    total_trades:
      op: ">="
      value: 30

  secondary:
    win_rate:
      op: ">="
      value: 0.30
    sharpe:
      op: ">="
      value: 0.5

  os_health:
    os_is_return_ratio:
      op: ">="
      value: 0.7
    direction_agreement:
      required: true

  auto_reject:
    win_rate:
      op: "<"
      value: 0.10
    sharpe:
      op: "<"
      value: -0.5
    total_trades:
      op: "<"
      value: 5

  budget:
    max_expressions_per_thesis: 8
    max_theses_per_run: 5
    max_trials: 20
