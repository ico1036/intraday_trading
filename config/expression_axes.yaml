# Expression axes — the knobs available within a single thesis.
#
# An "expression" is a point in this axis space. Two expressions of the same
# thesis must differ on at least one axis. This file is the enum authority;
# algorithm_prompt.txt's `expression_spec` block must pick values from here.
#
# thesis_gate.py uses "orthogonality" = how many axes differ between two
# expressions. "3+ orthogonal expressions with same failure mode" requires
# the expressions to differ on 3+ distinct axes.

version: 1

axes:
  bar_domain:
    description: "How bars are carved."
    values: [VOLUME, TICK, TIME, DOLLAR]

  bar_granularity:
    description: "Size class of bar. Absolute value set in expression_spec."
    values: [fine, medium, coarse]

  signal_form:
    description: "How the raw feature is transformed before thresholding."
    values: [raw, z_score, rolling_rank, percentile]

  threshold_type:
    description: "How the entry/exit threshold is set."
    values: [absolute, adaptive_quantile, regime_conditional]

  aggregation:
    description: "Temporal aggregation of the feature."
    values: [instantaneous, ema, cumulative_bucket]

  regime_filter:
    description: "Scope restriction — not a signal modifier."
    values: [none, vol_regime, session, funding_sign, trend_state]

  exit_rule:
    description: "How positions are closed."
    values: [time_stop, sl_tp, trailing, signal_reversal]

  sizing:
    description: "Position sizing policy."
    values: [fixed, vol_targeted, kelly]

  universe:
    description: "Symbols the expression runs on."
    values: [single_symbol, basket_topk, pair]
